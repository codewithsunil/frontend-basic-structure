<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Post Management</title>


</head>

<body>

  <!-- 🔹 PAGE CONTAINER -->
  <div class="container">

    <!-- 🔹 ADD / EDIT FORM -->
    <div class="card">
      <h2 id="formTitle">Add New Post</h2>

      <form id="postForm">
        <input type="hidden" id="postId">

        <div class="form-group">
          <label>Title</label>
          <input type="text" id="title" required>
        </div>

        <div class="form-group">
          <label>Body</label>
          <textarea id="body" rows="4" required></textarea>
        </div>

        <button type="submit">Save Post</button>
        <button type="button" id="resetBtn">Cancel</button>
      </form>
    </div>

    <!-- 🔹 POST LIST -->
    <div class="card">
      <h2>Post List</h2>

      <table id="postTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Body</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody>
          <!-- JS will render rows -->
        </tbody>
      </table>
    </div>

  </div>

  <script src="env.js"></script>
  <script type="module" src="assets/js/modules/PostModule.js"></script>
</body>

</html>
