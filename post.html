<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Post Management</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <!-- 🔹 PAGE CONTAINER -->
    <div class="container">
      <!-- 🔹 ADD / EDIT FORM -->
      <div class="card">
        <div class="card-header">Add New Post</div>
        <div class="card-body">
          <form id="postForm">
            <input type="hidden" id="postId" />

            <div class="form-group">
              <label>Title</label>
              <input type="text" class="form-control" id="title" required />
            </div>

            <div class="form-group">
              <label>Body</label>
              <textarea
                class="form-control"
                id="body"
                rows="4"
                required
              ></textarea>
            </div>

            <div class="form-group mt-3">
              <button type="submit" class="btn btn-primary">Save Post</button>
              <button type="button" id="resetBtn" class="btn btn-secondary">
                Cancel
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- 🔹 POST LIST -->
      <div class="card mt-2">
        <div class="card-header">Post List</div>
        <div class="card-body">
          <table id="postTable" class="table table-border">
            <thead>
              <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Body</th>
                <th>Action</th>
              </tr>
            </thead>

            <tbody>
              <!-- JS will render rows -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="env.js"></script>
    <script type="module" src="assets/js/modules/PostModule.js"></script>
  </body>
</html>
